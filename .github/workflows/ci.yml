name: CI

# Anti-drift gate: runs the harness invariant tests (MII fast==loop, quota K=0==soft, speaker_rule=None
# byte-stable, forced-non-kin-never-kin) + the existing no-oracle/redline + smoke tests on every push.
# If an AI (or human) edit silently changes harness behavior, this goes red.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt
      - name: Run tests (invariants + redline + smoke)
        run: python -m pytest tests/ -q
